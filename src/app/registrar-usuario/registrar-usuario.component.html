<div class="flex">
  <div class="flex-1 flex items-center justify-center mt-10">
    <form class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md space-y-6" #form="ngForm"
      (ngSubmit)="onSubmit(form)">
      <h2 class="text-2xl font-bold text-[#6a1b1b] text-center mb-4">Registrar Secretaria</h2>

      <!-- Campo Username -->
      <div>
        <label class="block text-[#24645c] font-semibold mb-1">Nombre de usuario</label>
        <input type="text" name="username" [(ngModel)]="usuario.username" required
          class="w-full px-4 py-2 border rounded focus:outline-none focus:border-[#24645c]"
          [ngClass]="{'border-red-500': formSubmitted && !usuario.username}" />
        <span *ngIf="formSubmitted && !usuario.username" class="text-red-600 text-xs">
          El nombre de usuario es obligatorio
        </span>
      </div>

      <!-- Campo Nombre Completo -->
      <div>
        <label class="block text-[#24645c] font-semibold mb-1">Nombre completo</label>
        <input type="text" name="fullName" [(ngModel)]="usuario.fullName" required
          class="w-full px-4 py-2 border rounded focus:outline-none focus:border-[#24645c]"
          [ngClass]="{'border-red-500': formSubmitted && !usuario.fullName}" />
        <span *ngIf="formSubmitted && !usuario.fullName" class="text-red-600 text-xs">
          El nombre completo es obligatorio
        </span>
      </div>

      <!-- Campo Contraseña -->
       <div>
          <label for="password" class="block text-sm font-medium text-[#195251] mb-1">Contraseña</label>
          <div
            class="relative flex items-center border border-gray-200 rounded-md p-2 focus-within:ring-2 focus-within:ring-[#832934]">
            <svg class="w-5 h-5 text-[#832934] mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 11c1.104 0 2 .896 2 2v2h-4v-2c0-1.104.896-2 2-2zm6 0V7a6 6 0 00-12 0v4H4v10h16V11h-2z" />
            </svg>
                
            <input id="password" name="password" [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="usuario.password" required autocomplete="current-password"
              class="w-full bg-transparent focus:outline-none placeholder-gray-400 text-gray-700 pr-10"
              placeholder="Contraseña" aria-label="Contraseña" />

            <!-- Botón show/hide -->
            <button type="button" (click)="toggleShowPassword()"
              class="absolute right-2 p-1 text-gray-500 hover:text-[#195251] focus:outline-none"
              [attr.aria-pressed]="showPassword"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <!-- Icono ojo -->
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              
              <!-- Icono ojo tachado -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24"
                stroke="currentColor" fill="none">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.122-3.333" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.1 6.1L17.9 17.9" />
              </svg>
            </button>
          </div>
        </div>


      <!-- Campo Confirmar Contraseña -->
      <div>
        <label for="confirmPassword" class="block text-[#24645c] font-semibold mb-1">Confirmar contraseña</label>
        <input id="confirmPassword" type="password" name="confirmPassword" [(ngModel)]="usuario.confirmPassword"
          required [ngClass]="{
                 'border-red-500': (formSubmitted && !usuario.confirmPassword) || 
                                   (usuario.password !== usuario.confirmPassword && usuario.confirmPassword)
               }" class="w-full px-4 py-2 border rounded focus:outline-none focus:border-[#24645c]" />
        <span *ngIf="formSubmitted && !usuario.confirmPassword" class="text-red-600 text-xs">
          Debes confirmar la contraseña
        </span>
        <span *ngIf="usuario.password !== usuario.confirmPassword && usuario.confirmPassword"
          class="text-red-600 text-xs">
          Las contraseñas no coinciden
        </span>
      </div>

      <button type="submit" [disabled]="!form.valid || usuario.password !== usuario.confirmPassword"
        class="w-full bg-[#24645c] text-white py-2 rounded hover:bg-[#6a1b1b] transition-colors font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
        Registrar
      </button>
    </form>
  </div>
</div>
<app-confirm-dialog
  *ngIf="showConfirmModal"
  [message]="confirmMessage"
  [title]="'Confirmación'"
  (confirm)="handleConfirm(true)"
  (cancel)="handleConfirm(false)">
</app-confirm-dialog>
